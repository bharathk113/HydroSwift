site_name: HydroSwift Documentation
site_description: Fast, unified workflows for hydrological data
site_url: https://hydroswift.readthedocs.io/

repo_url: https://github.com/carbform/HydroSwift
repo_name: carbform/HydroSwift
edit_uri: edit/main/docs/

theme:
  name: material

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate

    - search.highlight
    - search.suggest

    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html

  - toc:
      permalink: true

  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span

  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji

docs_dir: docs

nav:
  - Home: index.md

  - Getting Started:
      - Installation: getting_started/installation.md

  - Guides:
      - Python API Guide: PYTHON_API_GUIDE.md
      - CLI Usage Guide: CLI_USAGE_GUIDE.md

  - Reference:
      - API Functions: API_FUNCTIONS_REFERENCE.md
      - API ↔ CLI Map: PUBLIC_API_AND_CLI.md

  - Examples:
      - Overview: ../EXAMPLES_AND_NOTEBOOKS.md
      - Python Notebook: examples/hydroswift_python_examples.ipynb
      - CLI Notebook: examples/hydroswift_cli_examples.ipynb