site_name: SWIFT Documentation
site_description: Simple Water Information Fetch Tool (SWIFT)
repo_url: https://github.com/carbform/swift
repo_name: carbform/swift
edit_uri: edit/main/docs/

theme:
  name: material

  icon:
    repo: fontawesome/brands/github

  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - content.code.annotate

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji

nav:
  - Home: index.md
  - Python API Guide: PYTHON_API_GUIDE.md
  - CLI Usage Guide: CLI_USAGE_GUIDE.md
  - API Functions Reference: API_FUNCTIONS_REFERENCE.md
  - Public API and CLI Map: PUBLIC_API_AND_CLI.md
  - CLI Examples Notebook: CLI_EXAMPLES.ipynb
  - Python API Examples Notebook: PYTHON_API_EXAMPLES.ipynb