[project]
name = "swift-wris"
version = "0.4.1"
description = "Simple WRIS India Fetch Tool"
authors = [{name="Carbform"}]
requires-python = ">=3.9"

dependencies = [
    "requests",
    "pandas",
    "tqdm",
    "openpyxl",
    "matplotlib"
]

[project.optional-dependencies]
geo = ["geopandas", "shapely"]
rich = ["rich"]
all = ["geopandas", "shapely", "rich"]

[project.scripts]
swift = "swift_app.main:main"